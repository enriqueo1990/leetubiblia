<!--
  Plantilla de email — Confirm signup / OTP (Supabase → Authentication → Emails → Confirm signup)
  Es el primer correo de un usuario nuevo. Variable obligatoria: {{ .Token }} (código de 6 dígitos).
  Mismo diseño que magic_link.html.
-->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
  style="background:#FBFBFA;padding:32px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <tr>
    <td align="center">
      <table width="440" cellpadding="0" cellspacing="0" role="presentation"
        style="max-width:440px;width:100%;background:#FFFFFF;border:1px solid #EAE8E3;border-radius:16px;padding:36px 32px;">
        <tr>
          <td align="center" style="padding-bottom:8px;">
            <div style="width:56px;height:56px;border-radius:16px;background:#A88B6A;color:#FFFFFF;font-size:28px;line-height:56px;text-align:center;">📖</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:20px;font-weight:700;color:#1C1C1E;padding-bottom:6px;">
            Bienvenido a Lee Tu Biblia
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:16px;color:#8A8A8E;line-height:1.5;padding-bottom:28px;">
            Ingresá este código en la app para confirmar tu correo y empezar.
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:24px;">
            <div style="display:inline-block;background:#F2F1EE;border-radius:14px;padding:16px 28px;font-size:34px;font-weight:700;letter-spacing:8px;color:#1C1C1E;">
              {{ .Token }}
            </div>
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:13px;color:#8A8A8E;line-height:1.5;">
            El código vence en una hora. Si no creaste esta cuenta, ignorá este correo.
          </td>
        </tr>
      </table>
      <table width="440" cellpadding="0" cellspacing="0" role="presentation" style="max-width:440px;width:100%;">
        <tr>
          <td align="center" style="font-size:12px;color:#B9B7B2;padding-top:16px;">
            leetubiblia.com
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
