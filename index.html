<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lee Tu Biblia" />
    <!-- theme_color inicial; useTheme lo actualiza en vivo según el modo -->
    <meta name="theme-color" content="#F8F7F4" />
    <!-- Splash pre-React: visible mientras baja el bundle JS, reemplazado al montar -->
    <style>
      /* Fondo en html/body para que no haya flash blanco mientras React monta */
      html, body {
        margin: 0;
        background: #F8F7F4;
      }
      @media (prefers-color-scheme: dark) {
        html, body { background: #000000; }
      }
      #ltb-splash {
        display: flex;
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #F8F7F4;
      }
      #ltb-splash-verse {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
        padding: 0 40px;
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      }
      #ltb-splash-verse p {
        margin: 0;
        font-size: 17px;
        font-style: italic;
        color: #56565C;
        line-height: 1.5;
      }
      #ltb-splash-verse span {
        font-size: 13px;
        color: #8B8983;
      }
      @media (prefers-color-scheme: dark) {
        #ltb-splash { background: #000000; }
        #ltb-splash-verse p { color: #8E8E93; }
        #ltb-splash-verse span { color: #6A6A6E; }
      }
    </style>
    <title>Lee Tu Biblia</title>
    <meta
      name="description"
      content="Tu lectura bíblica diaria y tus oraciones, privadas o compartidas con tu grupo. Simple y sin ruido."
    />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lee Tu Biblia" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:url" content="https://leetubiblia.com/" />
    <meta property="og:title" content="Lee Tu Biblia" />
    <meta
      property="og:description"
      content="Tu lectura bíblica diaria y tus oraciones, en un solo lugar tranquilo."
    />
    <meta property="og:image" content="https://leetubiblia.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Lee Tu Biblia" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lee Tu Biblia" />
    <meta
      name="twitter:description"
      content="Tu lectura bíblica diaria y tus oraciones, en un solo lugar tranquilo."
    />
    <meta name="twitter:image" content="https://leetubiblia.com/og-image.png" />
  </head>
  <body>
    <div id="root">
      <div id="ltb-splash">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="80" height="80">
          <rect width="64" height="64" rx="14" fill="#A88B6A"/>
          <g fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M32 20C28 16.7 22.2 16 12 16v28c10.2 0 16 .7 20 4 4-3.3 9.8-4 20-4V16c-10.2 0-16 .7-20 4Z"/>
            <path d="M32 20v28"/>
          </g>
        </svg>
        <div id="ltb-splash-verse">
          <p>Santifícalos en la verdad;<br>Tu palabra es verdad.</p>
          <span>Juan 17:17 · NBLA</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
