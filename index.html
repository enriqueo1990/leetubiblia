    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="apple-mobile-web-app-title" content="Lee Tu Biblia" />
    <!-- theme_color inicial; useTheme lo actualiza en vivo según el modo -->
    <meta name="theme-color" content="#F8F7F4" />
    <!-- Único splash de arranque: completa libro, versículo y referencia mientras
         React prepara la pantalla real detrás. Solo se retira cuando ambas cosas
         terminaron: animación completa + app lista. -->
    <style>
      /* Fondo en html/body para que no haya flash blanco mientras React monta */
      html, body {
        margin: 0;
        background: #F8F7F4;
      }
      @media (prefers-color-scheme: dark) {
        html, body { background: #000000; }
      }
      #ltb-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F8F7F4;
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        opacity: 1;
        transition: opacity 0.35s ease;
      }
      #ltb-splash.ltb-splash-exit { opacity: 0; pointer-events: none; }
      #ltb-splash-core {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(-12px);
        padding: 0 40px;
        text-align: center;
      }
      #ltb-splash svg g { stroke: #A88B6A; }
      .ltb-book-cover { animation: ltb-draw 0.9s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both; }
      .ltb-book-spine { animation: ltb-draw 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.85s both; }
      @keyframes ltb-draw {
        from { stroke-dashoffset: 1; }
        to   { stroke-dashoffset: 0; }
      }
      #ltb-splash-verse, #ltb-splash-rule, #ltb-splash-ref { opacity: 0; }
      #ltb-splash-verse {
        margin: 40px 0 0;
        font-size: clamp(19px, 5.5vw, 21px);
        font-style: italic;
        line-height: 1.5;
        color: #1C1C1E;
      }
      #ltb-splash-rule { margin-top: 24px; width: 32px; height: 1px; background: #A88B6A; }
      #ltb-splash-ref {
        margin-top: 18px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #8B8983;
      }
      #ltb-splash-verse { animation: ltb-content-rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.15s both; }
      #ltb-splash-rule { animation: ltb-rule-grow 0.5s cubic-bezier(0.22, 1, 0.36, 1) 1.45s both; }
      #ltb-splash-ref { animation: ltb-content-rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) 1.7s both; }
      @keyframes ltb-content-rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes ltb-rule-grow {
        from { opacity: 0; transform: scaleX(0.4); }
        to { opacity: 1; transform: scaleX(1); }
      }
      #ltb-splash-brand {
        position: absolute;
        bottom: calc(40px + env(safe-area-inset-bottom));
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.28em;
        padding-left: 0.28em; /* compensa el tracking del último carácter */
        text-transform: uppercase;
        color: #705F4C; /* accent-ink claro precalculado */
        animation: ltb-rise 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.7s both;
      }
      @keyframes ltb-rise {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-color-scheme: dark) {
        #ltb-splash { background: #000000; }
        #ltb-splash svg g { stroke: #C2A57E; }
        #ltb-splash-verse { color: #F2F2F7; }
        #ltb-splash-rule { background: #C2A57E; }
        #ltb-splash-ref { color: #6A6A6E; }
        #ltb-splash-brand { color: #D5C4AE; } /* accent-ink oscuro precalculado */
      }
      @media (prefers-reduced-motion: reduce) {
        .ltb-book-cover, .ltb-book-spine, #ltb-splash-brand,
        #ltb-splash-verse, #ltb-splash-rule, #ltb-splash-ref { animation: none; opacity: 1; }
      }
    </style>

    <script>
      // El splash completa su secuencia y espera a que React tenga una pantalla
      // real lista. La app se monta detrás, de modo que la transición no revela
      // estados intermedios ni un segundo splash.
      (function () {
        var MIN_SPLASH_MS = 2500
        var startedAt = performance.now()
        var closing = false

        function dismissWhenReady() {
          if (closing || !window.__ltbAppReady) return
          closing = true
          var remaining = Math.max(0, MIN_SPLASH_MS - (performance.now() - startedAt))
          setTimeout(function finishLaunch() {
            // Una ruta lazy todavía puede estar preparando su pantalla. Mantener
            // el splash finalizado evita revelar un skeleton entre ambos estados.
            if (document.querySelector('[data-launch-pending]')) {
              setTimeout(finishLaunch, 50)
              return
            }
            var splash = document.getElementById('ltb-splash')
            if (!splash) return
            splash.classList.add('ltb-splash-exit')
            setTimeout(function () { splash.remove() }, 380)
          }, remaining)
        }

        window.addEventListener('ltb:app-ready', dismissWhenReady, { once: true })
        if (window.__ltbAppReady) dismissWhenReady()
      })()

      // Red de seguridad contra la "carga infinita en la 1ª apertura" de la PWA:
      // si React no montó varios segundos
      // después de cargar —típicamente porque el bundle o el service worker no
      // resolvieron en el primer arranque standalone—, recargamos UNA sola vez.
      // En la 2ª carga el SW ya sirve todo desde precache y monta bien. El flag en
      // sessionStorage evita un bucle de recargas.
      (function () {
        var KEY = 'ltb.bootReload'
        window.addEventListener('load', function () {
          setTimeout(function () {
            if (window.__ltbReactMounted) return
            try {
              if (sessionStorage.getItem(KEY)) return // ya recargamos una vez
              sessionStorage.setItem(KEY, '1')
            } catch (e) {}
            // Telemetría temporal: dejamos rastro en la cola (sobrevive al reload)
            // para confirmar que este camino se disparó. Ver src/lib/diag.js.
            try {
              var Q = 'ltb.diag.queue'
              var q = JSON.parse(localStorage.getItem(Q) || '[]')
              q.push({ event: 'boot_reload', detail: { waitedMs: 8000 }, ts: Date.now() })
              localStorage.setItem(Q, JSON.stringify(q.slice(-20)))
            } catch (e) {}
            location.reload()
          }, 8000)
        })
      })()
    </script>
