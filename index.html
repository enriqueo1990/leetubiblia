    <!-- Splash pre-React: visible mientras baja el bundle JS, reemplazado al montar -->
    <style>
      /* Fondo en html/body para que no haya flash blanco mientras React monta */
      html, body {
        margin: 0;
        background: #F8F7F4;
      }
      @media (prefers-color-scheme: dark) {
        html, body { background: #000000; }
      }
      #ltb-splash {
        display: flex;
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #F8F7F4;
      }
      #ltb-splash-verse {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
        padding: 0 40px;
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      }
      #ltb-splash-verse p {
        margin: 0;
        font-size: 17px;
        font-style: italic;
        color: #56565C;
        line-height: 1.5;
      }
      #ltb-splash-verse span {
        font-size: 13px;
        color: #8B8983;
      }
      @media (prefers-color-scheme: dark) {
        #ltb-splash { background: #000000; }
        #ltb-splash-verse p { color: #8E8E93; }
        #ltb-splash-verse span { color: #6A6A6E; }
      }
    </style>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Red de seguridad contra la "carga infinita en la 1ª apertura" de la PWA:
      // si React no montó (sigue presente el splash estático) varios segundos
      // después de cargar —típicamente porque el bundle o el service worker no
      // resolvieron en el primer arranque standalone—, recargamos UNA sola vez.
      // En la 2ª carga el SW ya sirve todo desde precache y monta bien. El flag en
      // sessionStorage evita un bucle de recargas.
      (function () {
        var KEY = 'ltb.bootReload'
        window.addEventListener('load', function () {
          setTimeout(function () {
            // Si #ltb-splash ya no está, React montó y reemplazó el contenido: OK.
            if (!document.getElementById('ltb-splash')) return
            try {
              if (sessionStorage.getItem(KEY)) return // ya recargamos una vez
              sessionStorage.setItem(KEY, '1')
            } catch (e) {}
            // Telemetría temporal: dejamos rastro en la cola (sobrevive al reload)
            // para confirmar que este camino se disparó. Ver src/lib/diag.js.
            try {
              var Q = 'ltb.diag.queue'
              var q = JSON.parse(localStorage.getItem(Q) || '[]')
              q.push({ event: 'boot_reload', detail: { waitedMs: 8000 }, ts: Date.now() })
              localStorage.setItem(Q, JSON.stringify(q.slice(-20)))
            } catch (e) {}
            location.reload()
          }, 8000)
        })
      })()
    </script>
  </body>
